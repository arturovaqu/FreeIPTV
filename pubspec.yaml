name: iptv_app
description: IPTV App with live TV, series, and movies support.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  media_kit: ^1.0.0
  media_kit_video: ^2.0.0
  media_kit_libs_android_video: ^1.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.1.0
  go_router: ^12.0.0
  provider: ^6.0.0
  uuid: ^4.0.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

# media_kit_video 2.0.1 (latest on pub.dev) doesn't implement onSurfaceDestroyed()
# required by Flutter 3.27+. Use the main branch which has the fix.
dependency_overrides:
  media_kit_video:
    git:
      url: https://github.com/media-kit/media-kit
      path: media_kit_video
      ref: main
flutter:
  uses-material-design: true
  assets:
    - assets/images/
