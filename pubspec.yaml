name: iptv_app
description: IPTV App with live TV, series, and movies support.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  video_player: ^2.9.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.1.0
  go_router: ^16.1.0
  provider: ^6.0.0
  uuid: ^4.0.0
  intl: ^0.19.0
  mobile_scanner: ^6.0.11
  qr_flutter: ^4.1.0
  media_kit:
    git:
      url: https://github.com/media-kit/media-kit.git
      path: media_kit
  media_kit_video:
    git:
      url: https://github.com/media-kit/media-kit.git
      path: media_kit_video
  media_kit_libs_video: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter

dependency_overrides:
  media_kit:
    git:
      url: https://github.com/media-kit/media-kit.git
      path: media_kit
  media_kit_video:
    git:
      url: https://github.com/media-kit/media-kit.git
      path: media_kit_video

flutter:
  uses-material-design: true
  assets:
    - assets/images/
