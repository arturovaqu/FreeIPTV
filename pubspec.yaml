name: iptv_app
description: IPTV App with live TV, series, and movies support.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  video_player: ^2.9.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.1.0
  go_router: ^12.0.0
  provider: ^6.0.0
  uuid: ^4.0.0
  intl: ^0.19.0
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
