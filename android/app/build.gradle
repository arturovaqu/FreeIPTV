plugins {
    id "com.android.application"
    id "kotlin-android"
    // Loads flutter.gradle via the plugin loader declared in settings.gradle.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.example.iptv_app"
    compileSdk 36
    // Pin the NDK used by media_kit's native libs.
    ndkVersion "25.1.8937393"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = "1.8"
    }

    sourceSets {
        main.java.srcDirs += "src/main/kotlin"
    }

    defaultConfig {
        applicationId "com.example.iptv_app"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            // Use debug signing for now; replace with a proper keystore for production.
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
        debug {
            applicationIdSuffix ".debug"
        }
    }
}

flutter {
    source "../.."
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib:2.2.0"
}
